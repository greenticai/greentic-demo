name: Publish Demo Bundles

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      workspace_version: ${{ steps.workspace-version.outputs.workspace_version }}
      publish_version: ${{ steps.publish-version.outputs.publish_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read workspace version
        id: workspace-version
        run: |
          set -euo pipefail
          workspace_version="$(sed -n '/^\[workspace.package\]/,/^\[/s/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "${workspace_version}" ]]; then
            echo "Failed to read workspace.package.version from Cargo.toml" >&2
            exit 1
          fi
          echo "workspace_version=${workspace_version}" >> "$GITHUB_OUTPUT"

      - name: Resolve publish version
        id: publish-version
        env:
          WORKSPACE_VERSION: ${{ steps.workspace-version.outputs.workspace_version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            publish_version="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            publish_version="${WORKSPACE_VERSION}"
          else
            publish_version=""
          fi
          echo "publish_version=${publish_version}" >> "$GITHUB_OUTPUT"

  publish-components:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect component changes
        id: component-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            components:
              - 'crates/**/component-*/**'
              - 'crates/**/greentic-*/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/publish.yml'

      - name: Initialize component refs artifact
        run: |
          mkdir -p .artifacts
          : > .artifacts/component-refs.txt

      - name: Install Rust
        if: steps.component-changes.outputs.components == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: wasm32-wasip2

      - name: Install cargo-binstall
        if: steps.component-changes.outputs.components == 'true'
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-component and wkg
        if: steps.component-changes.outputs.components == 'true'
        run: cargo binstall -y cargo-component wkg

      - name: Cache Rust build artifacts
        if: steps.component-changes.outputs.components == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-components-v1
          cache-targets: true
          cache-on-failure: true

      - name: Install ORAS
        if: steps.component-changes.outputs.components == 'true'
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        if: steps.component-changes.outputs.components == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and publish components
        if: steps.component-changes.outputs.components == 'true'
        env:
          OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          PUBLISH_VERSION: ${{ needs.resolve-version.outputs.publish_version }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          while IFS= read -r dir; do
            component_name="$(basename "$dir")"
            package_name="$(sed -n 's/^name = "\(.*\)"/\1/p' "$dir/Cargo.toml" | head -n1)"
            cargo component build --release --target wasm32-wasip2 --manifest-path "$dir/Cargo.toml"
            artifact="$dir/target/wasm32-wasip2/release/${package_name//-/_}.wasm"
            sha_ref="ghcr.io/${OWNER}/greentic-demo-components/${component_name}:${SHA}"
            wkg oci push "$sha_ref" "$artifact"
            echo "${component_name}=oci://${sha_ref}" >> .artifacts/component-refs.txt
            if [[ -n "${PUBLISH_VERSION}" ]]; then
              version_ref="ghcr.io/${OWNER}/greentic-demo-components/${component_name}:${PUBLISH_VERSION}"
              wkg oci push "$version_ref" "$artifact"
              echo "${component_name}_version=oci://${version_ref}" >> .artifacts/component-refs.txt
            fi
            if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
              latest_ref="ghcr.io/${OWNER}/greentic-demo-components/${component_name}:latest"
              wkg oci push "$latest_ref" "$artifact"
              echo "${component_name}_latest=oci://${latest_ref}" >> .artifacts/component-refs.txt
            fi
          done < <(find crates -mindepth 2 -maxdepth 2 -type d \( -name 'component-*' -o -name 'greentic-*' \) | sort)

      - name: Skip component publish when unchanged
        if: steps.component-changes.outputs.components != 'true'
        run: echo "No public component source changes detected. Skipping component build/publish."

      - name: Upload component refs
        uses: actions/upload-artifact@v4
        with:
          name: component-refs
          path: .artifacts/component-refs.txt
          if-no-files-found: error

  publish-app-packs:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish app packs
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
          PUBLISH_VERSION: ${{ needs.resolve-version.outputs.publish_version }}
        run: |
          set -euo pipefail
          while IFS= read -r pack_dir; do
            pack_name="$(basename "$pack_dir" .pack)"
            echo "Publishing ${pack_name}..."
            cd "$pack_dir"
            sha_ref="ghcr.io/${OWNER}/packs/apps/${pack_name}:${SHA}"
            oras push "$sha_ref" .
            echo "  -> ${sha_ref}"
            if [[ -n "${PUBLISH_VERSION}" ]]; then
              version_ref="ghcr.io/${OWNER}/packs/apps/${pack_name}:${PUBLISH_VERSION}"
              oras push "$version_ref" .
              echo "  -> ${version_ref}"
            fi
            if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
              latest_ref="ghcr.io/${OWNER}/packs/apps/${pack_name}:latest"
              oras push "$latest_ref" .
              echo "  -> ${latest_ref}"
            fi
            cd - > /dev/null
          done < <(find crates -path '*/bundle/packs/*.pack' -type d | sort)

  publish-demos:
    if: always()
    needs: [resolve-version, publish-components, publish-app-packs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: wasm32-wasip2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install gtc
        run: cargo binstall -y gtc && gtc install

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package demos
        run: scripts/package_demos.sh

      - name: Detect demo artifacts
        id: artifacts
        run: |
          shopt -s nullglob
          bundles=(demos/*.gtbundle)
          packs=(demos/*.gtpack)
          if [ ${#bundles[@]} -eq 0 ] && [ ${#packs[@]} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No demo artifacts found. Skipping publish steps."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload workflow artifact
        if: steps.artifacts.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifacts
          path: |
            demos/*.gtbundle
            demos/*.gtpack
          if-no-files-found: error

      - name: Publish demo artifacts to GHCR
        if: steps.artifacts.outputs.found == 'true'
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          BRANCH_NAME: ${{ github.ref_name }}
          PUBLISH_VERSION: ${{ needs.resolve-version.outputs.publish_version }}
        run: scripts/publish_demo_bundles_oci.sh

      - name: Upload bundle refs
        if: steps.artifacts.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: demo-bundle-refs
          path: .artifacts/bundle-refs.txt
          if-no-files-found: error

      - name: Upload pack refs
        if: steps.artifacts.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: demo-pack-refs
          path: .artifacts/pack-refs.txt
          if-no-files-found: ignore

      - name: Ensure release exists
        if: steps.artifacts.outputs.found == 'true' && needs.resolve-version.outputs.publish_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve-version.outputs.publish_version }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes ""
          fi

      - name: Attach bundles and answers to release
        if: steps.artifacts.outputs.found == 'true' && needs.resolve-version.outputs.publish_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve-version.outputs.publish_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(
            demos/*.gtbundle
            demos/*.gtpack
            demos/*-create-answers.json
            demos/*-setup-answers.json
          )

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No demo release assets found to upload." >&2
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber

      - name: Verify attached demo release assets
        if: steps.artifacts.outputs.found == 'true' && needs.resolve-version.outputs.publish_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve-version.outputs.publish_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_assets="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')"
          missing=0

          for file in demos/*.gtbundle demos/*.gtpack demos/*-create-answers.json demos/*-setup-answers.json; do
            name="$(basename "$file")"
            if ! grep -Fxq "$name" <<<"$release_assets"; then
              echo "Missing release asset: $name" >&2
              missing=1
            fi
          done

          # Every create-answers.json must have a corresponding .gtbundle in the release.
          # This catches the case where packaging silently skips a demo.
          for answers in demos/*-create-answers.json; do
            bundle_id="$(jq -r '.answers.delegate_answer_document.answers.bundle_id // empty' "$answers")"
            if [[ -z "$bundle_id" ]]; then
              continue
            fi
            expected="${bundle_id}.gtbundle"
            if ! grep -Fxq "$expected" <<<"$release_assets"; then
              echo "Missing expected bundle for $(basename "$answers"): $expected" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi
