name: Publish Demo Bundles

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-components:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Install cargo-component and wkg
        run: cargo install --locked cargo-component wkg

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and publish components
        env:
          OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          while IFS= read -r dir; do
            component_name="$(basename "$dir")"
            package_name="$(sed -n 's/^name = "\(.*\)"/\1/p' "$dir/Cargo.toml" | head -n1)"
            cargo component build --release --target wasm32-wasip2 --manifest-path "$dir/Cargo.toml"
            artifact="target/wasm32-wasip1/release/${package_name//-/_}.wasm"
            sha_ref="oci://ghcr.io/${OWNER}/greentic-demo-components/${component_name}:${SHA}"
            wkg oci push "$sha_ref" "$artifact"
            echo "${component_name}=${sha_ref}" >> .artifacts/component-refs.txt
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              tag_ref="oci://ghcr.io/${OWNER}/greentic-demo-components/${component_name}:${REF_NAME}"
              wkg oci push "$tag_ref" "$artifact"
              echo "${component_name}_tag=${tag_ref}" >> .artifacts/component-refs.txt
            elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
              latest_ref="oci://ghcr.io/${OWNER}/greentic-demo-components/${component_name}:latest"
              wkg oci push "$latest_ref" "$artifact"
              echo "${component_name}_latest=${latest_ref}" >> .artifacts/component-refs.txt
            fi
          done < <(find crates -mindepth 2 -maxdepth 2 -type d \( -name 'component-*' -o -name 'greentic-*' \) | sort)

      - name: Upload component refs
        uses: actions/upload-artifact@v4
        with:
          name: component-refs
          path: .artifacts/component-refs.txt
          if-no-files-found: error

  publish-demos:
    needs: publish-components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package demos
        run: scripts/package_demos.sh

      - name: Detect bundles
        id: bundles
        run: |
          shopt -s nullglob
          bundles=(demos/*.gtbundle)
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No demo bundles found. Skipping publish steps."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload workflow artifact
        if: steps.bundles.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: demo-bundles
          path: demos/*.gtbundle
          if-no-files-found: error

      - name: Attach bundles to release
        if: steps.bundles.outputs.found == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: demos/*.gtbundle
