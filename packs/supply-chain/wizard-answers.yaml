# Wizard answers for Supply Chain & Inventory Demo Bundle
# Use with: gtc wizard --answers wizard-answers.yaml

schema_id: greentic-bundle.wizard.answers
schema_version: "1.0.0"
wizard_id: greentic-bundle.wizard.run
locale: en

answers:
  mode: create
  bundle_id: supply-chain
  bundle_name: "Supply Chain & Inventory Demo"
  output_dir: "./supply-chain"

  # App packs to include
  app_packs:
    - "./packs/supply-chain"

  # Extension providers from OCI registry
  extension_providers:
    # Messaging providers
    - "oci://ghcr.io/greenticai/greentic-packs/messaging-webchat-gui:latest"
    - "oci://ghcr.io/greenticai/greentic-packs/messaging-slack:latest"
    - "oci://ghcr.io/greenticai/greentic-packs/messaging-teams:latest"
    # State provider
    - "oci://ghcr.io/greenticai/greentic-packs/state-memory:latest"

  # No OAuth capability packs needed
  capability_packs: []

  # Remote catalogs (optional)
  remote_catalogs: []

  # Advanced setup
  advanced_setup: true
  export_intent: false
  setup_execution_intent: true

locks: {}
