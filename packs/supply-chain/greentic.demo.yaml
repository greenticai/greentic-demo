version: "1"
project_root: "./"
tenant: "supply-chain-demo"
team: "default"
environment: "dev"

logging:
  level: "debug"
  format: "pretty"

http:
  host: "127.0.0.1"
  port: 8080

# Application pack
apps:
  supply-chain:
    enabled: true
    pack: "./"
    routing:
      messaging:
        default: "on_message"

# Provider configuration
providers:
  # Messaging providers
  messaging:
    webchat-gui:
      enabled: true
      pack: "providers/messaging/messaging-webchat-gui.gtpack"

  # State providers
  state:
    memory:
      enabled: true
      pack: "providers/messaging/state-memory.gtpack"
