# Tenant bindings for Supply Chain & Inventory Demo
# This file configures the pack for a specific tenant

tenant: supply-chain-demo
team: default
environment: dev

# Pack reference
pack:
  id: greentic.supply-chain.demo
  source: local
  path: ./

# MCP tool store configuration
mcp:
  store:
    kind: http-single
    name: inventory_tools
    # Inventory MCP tools WASM component URL
    url: "${MCP_INVENTORY_TOOLS_URL:-https://github.com/greenticai/greentic-packs/raw/main/mcp/inventory_tools.wasm}"
  security:
    require_signature: false
  runtime:
    max_memory_mb: 128
    timeout_ms: 30000
    fuel: 100000000

# State configuration
state:
  backend: memory
  ttl_seconds: 3600

# Messaging routes
routes:
  messaging:
    default: on_message
