version: "1"
project_root: "./"
tenant: "sales-crm-demo"
team: "default"
environment: "dev"

logging:
  level: "debug"
  format: "pretty"

http:
  host: "127.0.0.1"
  port: 8080

# Application pack
apps:
  sales-crm:
    enabled: true
    pack: "./"
    routing:
      messaging:
        default: "on_message"
      events:
        webhook: "on_event"
      oauth:
        callback: "salesforce_oauth_flow"

# Provider configuration
providers:
  # Messaging providers
  messaging:
    webchat-gui:
      enabled: true
      pack: "providers/messaging/messaging-webchat-gui.gtpack"

  # State providers
  state:
    memory:
      enabled: true
      pack: "providers/messaging/state-memory.gtpack"

# OAuth configuration
oauth:
  providers:
    salesforce:
      enabled: true
      client_id: "${SALESFORCE_CLIENT_ID}"
      client_secret: "${SALESFORCE_CLIENT_SECRET}"
      scopes:
        - api
        - refresh_token
