version: "1"
project_root: "./"
tenant: "helpdesk-demo"
team: "default"
environment: "dev"

logging:
  level: "debug"
  format: "pretty"

http:
  host: "127.0.0.1"
  port: 8080

# Application pack
apps:
  helpdesk-itsm:
    enabled: true
    pack: "./"
    routing:
      messaging:
        default: "on_message"
      events:
        webhook: "on_event"
      oauth:
        callback: "jira_oauth_flow"

# Provider configuration
providers:
  # Messaging providers
  messaging:
    webchat-gui:
      enabled: true
      pack: "providers/messaging/messaging-webchat-gui.gtpack"

  # State providers
  state:
    memory:
      enabled: true
      pack: "providers/messaging/state-memory.gtpack"

# OAuth configuration
oauth:
  providers:
    jira:
      enabled: true
      client_id: "${JIRA_CLIENT_ID}"
      client_secret: "${JIRA_CLIENT_SECRET}"
      authorization_url: "https://auth.atlassian.com/authorize"
      token_url: "https://auth.atlassian.com/oauth/token"
      scopes:
        - read:jira-work
        - write:jira-work
        - read:jira-user
