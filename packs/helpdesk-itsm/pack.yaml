pack_id: greentic.helpdesk-itsm.demo
version: 0.1.0
kind: application
publisher: Greentic
description: IT Helpdesk ITSM Demo - Manage tickets, search knowledge base, and escalate issues via Jira

# Components for OAuth card rendering and MCP execution
components:
  - id: ai.greentic.component-adaptive-card
    version: 0.1.18
    world: greentic:component/component@0.6.0
    supports:
      - messaging
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        random: true
        clocks: true
      host: {}
    wasm: components/component_adaptive_card.wasm

  - id: mcp.exec
    version: 0.1.0
    world: root:component/root
    supports:
      - messaging
    profiles:
      default: default
      supported:
        - default
    capabilities:
      wasi:
        random: false
        clocks: false
      host: {}
    wasm: components/mcp.exec/component.wasm

# Extensions - msg2events and events2msg components
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      refs:
        - "oci://ghcr.io/greenticai/component/component-msg2events:latest"
        - "oci://ghcr.io/greenticai/component/component-events2msg:latest"
      mode: eager
      allow_tags: true

# OAuth broker dependency for Jira authentication
dependencies:
  - alias: oauth
    pack_id: io.greentic.capabilities.oauth
    version_req: ^1.0.0
    required_capabilities:
      - greentic.cap.oauth.broker.v1

# Flow definitions
flows:
  - id: on_message
    file: flows/on_message.ygtc
    tags:
      - default
      - messaging
    entrypoints:
      - default

  - id: jira_oauth_flow
    file: flows/jira_oauth_flow.ygtc
    tags:
      - oauth
      - jira
    entrypoints:
      - oauth_connect

  - id: create_ticket_flow
    file: flows/create_ticket_flow.ygtc
    tags:
      - jira
      - tickets
    entrypoints:
      - create_ticket

  - id: knowledge_base_flow
    file: flows/knowledge_base_flow.ygtc
    tags:
      - knowledge-base
      - search
    entrypoints:
      - search_kb

  - id: on_event
    file: flows/on_event.ygtc
    tags:
      - events
      - jira
      - webhook
    entrypoints:
      - webhook

# Asset files
assets:
  - path: assets/welcome_card.json
  - path: assets/jira_connect_card.json
  - path: assets/create_ticket_card.json
  - path: assets/ticket_status_card.json
  - path: assets/kb_results_card.json
  - path: assets/escalation_card.json

# Secrets required for this pack
secrets:
  JIRA_CLIENT_ID:
    description: "Jira (Atlassian) OAuth App Client ID"
    required: true
  JIRA_CLIENT_SECRET:
    description: "Jira (Atlassian) OAuth App Client Secret"
    required: true
  JIRA_CLOUD_ID:
    description: "Atlassian Cloud site ID (found in tenant URL)"
    required: false

# Setup parameters
parameters:
  oauth_provider: jira
  oauth_scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
  jira_project_key: "ITSM"
  default_issue_type: "Task"
  escalation_issue_type: "Bug"
  kb_max_results: 10
