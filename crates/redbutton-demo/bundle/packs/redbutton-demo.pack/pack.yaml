pack_id: redbutton-demo.pack
version: 0.1.0
kind: application
publisher: Greentic
components:
- id: ai.greentic.component-betterstack-incident.create-incident
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  - event
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: true
      clocks: true
    host:
      secrets:
        required:
        - key: betterstack_token
          required: true
          scope:
            env: dev
            tenant: default
      http:
        client: true
        server: false
  wasm: components/component-betterstack-incident/component.wasm
- id: ai.greentic.component-http.post-json
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  - event
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: true
    host:
      http:
        client: true
        server: false
  wasm: components/component-http/component.wasm
- id: ai.greentic.component-random.select-route
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  - event
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: true
      clocks: true
    host: {}
  wasm: components/component-random/component.wasm
- id: ai.greentic.greentic-http2play.play-url
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  - event
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: true
    host:
      http:
        client: true
        server: false
  wasm: components/greentic-http2play/component.wasm
dependencies: []
flows:
- id: global_redbutton
  file: flows/global-redbutton.ygtc
  tags:
  - default
  entrypoints:
  - global
assets: []
