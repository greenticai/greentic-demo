version: 1
tenant: default
project_root: crates/redbutton-demo/bundle
bundle:
  bundle_id: redbutton-demo
  bundle_name: redbutton-demo
  locale: en-GB
  mode: create
  advanced_setup: false
  setup_execution_intent: false
  export_intent: false
policy:
  source:
    tenant_gmap: tenants/default/tenant.gmap
  default: forbidden
catalogs:
  []
app_packs:
  - reference: packs/redbutton-demo.pack
    policy: public
  - reference: public-deployer-aws-vm
    policy: public
extension_providers:
  - oci://ghcr.io/greenticai/packs/events/events-webhook:latest
hooks:
  []
subscriptions:
  []
capabilities:
  []
