title: WeatherAPI Setup
description: Configure WeatherAPI runtime secrets used by current and forecast operations.
questions:
  - name: auth_param_get_weather_key
    secret_key: user.greentic-dev.auth_param_get_weather_key
    kind: string
    required: true
    secret: true
    title: WeatherAPI API key (Current Weather)
    help: API key used by get_weather. You can reuse the same key for forecast.
    placeholder: Enter your WeatherAPI key
  - name: auth_param_get_forecast_weather_key
    secret_key: user.greentic-dev.auth_param_get_forecast_weather_key
    kind: string
    required: true
    secret: true
    title: WeatherAPI API key (Forecast Weather)
    help: API key used by get_forecast_weather. You can reuse the same key from current weather.
    placeholder: Enter your WeatherAPI key
