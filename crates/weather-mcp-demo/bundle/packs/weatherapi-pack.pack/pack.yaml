pack_id: weatherapi-pack
version: 0.1.0
kind: application
publisher: Greentic
components:
- id: ai.greentic.component-adaptive-card
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/adaptive-card/component_adaptive_card.wasm
- id: weatherapi_current.component
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host:
      http:
        client: true
        server: false
  wasm: components/weatherapi_current.component.wasm
dependencies: []
flows:
- id: default
  file: flows/main.ygtc
  tags:
  - default
  entrypoints:
  - default
- id: flow_
  file: flows/flow_.ygtc
  tags:
  - internal
  entrypoints:
  - default
- id: flow_get_forecast_weather
  file: flows/flow_get_forecast_weather.ygtc
  tags:
  - internal
  entrypoints:
  - default
- id: flow_get_weather
  file: flows/flow_get_weather.ygtc
  tags:
  - internal
  entrypoints:
  - default
assets:
- path: assets/weather_forecast_card.json
- path: assets/weather_forecast_payload.json
- path: assets/weather_current_result_card.json
- path: assets/weather_forecast_result_card.json
