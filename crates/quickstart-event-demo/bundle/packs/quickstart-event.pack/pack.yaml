pack_id: greentic.quickstart-event.demo
version: 0.1.0
kind: application
publisher: Greentic
display_name: Quickstart Event Demo
components:
- id: ai.greentic.component-adaptive-card
  version: 0.4.60
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/ai.greentic.component-adaptive-card.wasm
dependencies: []
flows:
- id: on_message
  file: flows/on_message.ygtc
  tags:
  - default
  - messaging
  entrypoints:
  - default
- id: on_timer
  file: flows/on_timer.ygtc
  tags:
  - events
  - timer
  entrypoints:
  - default
- id: on_webhook
  file: flows/on_webhook.ygtc
  tags:
  - events
  - webhook
  entrypoints:
  - default
assets:
- path: assets/cards/welcome_card.json
- path: assets/cards/webhook_received_card.json
- path: assets/cards/timer_tick_card.json
- path: assets/cards/email_sent_card.json
- path: assets/cards/sms_sent_card.json
- path: assets/i18n/en.json
