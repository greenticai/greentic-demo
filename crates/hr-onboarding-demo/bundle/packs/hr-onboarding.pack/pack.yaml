pack_id: greentic.hr-onboarding.demo
version: 0.1.0
kind: application
publisher: Greentic
components: []
dependencies: []
flows:
- id: on_message
  file: flows/on_message.ygtc
  tags:
  - default
  - messaging
  entrypoints:
  - default
assets:
- path: assets/cards/welcome_card.json
- path: assets/cards/employee_form_card.json
- path: assets/cards/onboarding_checklist_card.json
- path: assets/cards/document_upload_card.json
- path: assets/cards/access_request_card.json
- path: assets/cards/completion_card.json
- path: assets/i18n/en.json
- path: assets/i18n/id.json
- path: assets/i18n/es.json
- path: assets/i18n/fr.json
- path: assets/i18n/de.json
- path: assets/i18n/ja.json
- path: assets/i18n/zh.json
- path: assets/i18n/_manifest.json
- path: assets/webchat-gui/skins/hr-onboarding/skin.json
- path: assets/webchat-gui/skins/hr-onboarding/fullpage/index.html
- path: assets/webchat-gui/skins/hr-onboarding/fullpage/page.css
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      allow_tags: true
      mode: eager
      refs:
      - oci://ghcr.io/greenticai/components/component-adaptive-card:latest
