pack_id: greentic.hr-onboarding.demo
version: 0.1.0
kind: application
publisher: Greentic
description: HR Onboarding Demo - Employee onboarding wizard with document collection and access provisioning

# Components for card rendering and MCP execution
components:
  - id: ai.greentic.component-adaptive-card
    version: 0.1.18
    world: greentic:component/component@0.6.0
    supports:
      - messaging
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        random: true
        clocks: true
      host: {}
    wasm: components/component_adaptive_card.wasm

  - id: mcp.exec
    version: 0.1.0
    world: root:component/root
    supports:
      - messaging
    profiles:
      default: default
      supported:
        - default
    capabilities:
      wasi:
        random: false
        clocks: false
      host: {}
    wasm: components/mcp.exec/component.wasm

# No extensions needed - no webhook events for HR onboarding
# No OAuth dependencies - uses MCP tools + state management only

# Flow definitions
flows:
  - id: on_message
    file: flows/on_message.ygtc
    tags:
      - default
      - messaging
    entrypoints:
      - default

  - id: onboarding_wizard_flow
    file: flows/onboarding_wizard_flow.ygtc
    tags:
      - onboarding
      - wizard
    entrypoints:
      - start_wizard

  - id: document_collection_flow
    file: flows/document_collection_flow.ygtc
    tags:
      - onboarding
      - documents
    entrypoints:
      - collect_documents

  - id: access_provisioning_flow
    file: flows/access_provisioning_flow.ygtc
    tags:
      - onboarding
      - access
    entrypoints:
      - provision_access

# Asset files
assets:
  - path: assets/cards/welcome_card.json
  - path: assets/cards/employee_form_card.json
  - path: assets/cards/onboarding_checklist_card.json
  - path: assets/cards/document_upload_card.json
  - path: assets/cards/access_request_card.json
  - path: assets/cards/completion_card.json

# Secrets required for this pack
secrets:
  HR_SYSTEM_API_KEY:
    description: "API key for HR management system"
    required: true

# Setup parameters
parameters:
  company_name: "Acme Corp"
  onboarding_checklist_version: "v2"
  default_department: "Engineering"
  document_retention_days: 90
