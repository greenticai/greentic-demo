pack_id: greentic.helpdesk-itsm.demo
version: 0.1.0
kind: application
publisher: Greentic
components: []
dependencies:
- alias: oauth
  pack_id: io.greentic.capabilities.oauth
  version_req: ^1.0.0
  required_capabilities:
  - greentic.cap.oauth.broker.v1
flows:
- id: create_ticket_flow
  file: flows/create_ticket_flow.ygtc
  tags:
  - jira
  - tickets
  entrypoints:
  - create_ticket
- id: jira_oauth_flow
  file: flows/jira_oauth_flow.ygtc
  tags:
  - oauth
  - jira
  entrypoints:
  - oauth_connect
- id: knowledge_base_flow
  file: flows/knowledge_base_flow.ygtc
  tags:
  - knowledge-base
  - search
  entrypoints:
  - search_kb
- id: on_event
  file: flows/on_event.ygtc
  tags:
  - events
  - jira
  - webhook
  entrypoints:
  - webhook
- id: on_message
  file: flows/on_message.ygtc
  tags:
  - default
  - messaging
  entrypoints:
  - default
assets:
- path: assets/cards/welcome_card.json
- path: assets/cards/jira_connect_card.json
- path: assets/cards/create_ticket_card.json
- path: assets/cards/ticket_status_card.json
- path: assets/cards/kb_results_card.json
- path: assets/cards/escalation_card.json
- path: assets/i18n/en.json
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      allow_tags: true
      mode: eager
      refs:
      - oci://ghcr.io/greenticai/components/component-adaptive-card@sha256:6b34848f801c7a70b8ce88e111ce49cce61e358404de17f65afefe77b07bf2d2
      - oci://ghcr.io/greenticai/component/component-msg2events@sha256:c799dea25af2521701b75b40d2827b65d4250e0574e2ab794b366ffedf601acc
      - oci://ghcr.io/greenticai/component/component-events2msg@sha256:aac2126add873723960343b86dc9e8bfbf892278b43302cc432f230dc9f5ee57
