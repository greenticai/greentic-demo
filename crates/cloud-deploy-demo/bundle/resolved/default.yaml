version: 1
tenant: default
project_root: ./cloud-deploy-demo-bundle
bundle:
  bundle_id: cloud-deploy-demo
  bundle_name: Cloud Deploy Demo
  locale: en
  mode: create
  advanced_setup: false
  setup_execution_intent: false
  export_intent: false
policy:
  source:
    tenant_gmap: tenants/default/tenant.gmap
  default: forbidden
catalogs:
  []
app_packs:
  - reference: https://github.com/greenticai/greentic-demo/releases/latest/download/cards-demo.gtpack
    policy: public
extension_providers:
  - https://github.com/greenticai/greentic-demo/releases/latest/download/events-webhook.gtpack
  - https://github.com/greenticai/greentic-demo/releases/latest/download/messaging-webchat-gui.gtpack
  - https://github.com/greenticai/greentic-demo/releases/latest/download/state-memory.gtpack
hooks:
  []
subscriptions:
  []
capabilities:
  []
