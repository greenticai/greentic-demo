version: 1
tenant: default
project_root: ./cloud-deploy-demo-bundle
bundle:
  bundle_id: cloud-deploy-demo
  bundle_name: Cloud Deploy Demo
  locale: en
  mode: create
  advanced_setup: false
  setup_execution_intent: false
  export_intent: false
policy:
  source:
    tenant_gmap: tenants/default/tenant.gmap
  default: forbidden
catalogs:
  []
app_packs:
  - reference: https://github.com/greenticai/greentic-demo/releases/latest/download/cards-demo.gtpack
    policy: public
extension_providers:
  - oci://ghcr.io/greenticai/packs/events/events-webhook:latest
  - oci://ghcr.io/greenticai/packs/messaging/messaging-webchat-gui:latest
  - oci://ghcr.io/greenticai/packs/state/state-memory:latest
hooks:
  []
subscriptions:
  []
capabilities:
  []
