pack_id: quickstart.pack
version: 0.1.0
kind: application
publisher: Greentic
components: []
dependencies: []
flows:
- id: on_message
  file: flows/on_message.ygtc
  tags:
  - default
  - messaging
  entrypoints:
  - default
assets:
- path: assets/cards/welcome_card.json
- path: assets/cards/about_card.json
- path: assets/i18n/en.json
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      allow_tags: true
      mode: eager
      refs:
      - oci://ghcr.io/greenticai/components/component-adaptive-card:latest
