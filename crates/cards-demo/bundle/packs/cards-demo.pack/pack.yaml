pack_id: cards-demo
version: 0.2.0
kind: application
publisher: Greentic
components:
- id: ai.greentic.component-adaptive-card
  version: 0.1.18
  world: greentic:component/component@0.6.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    wasi:
      random: true
      clocks: true
    host: {}
  wasm: components/component_adaptive_card.wasm
- id: mcp.exec
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/mcp.exec/component.wasm
dependencies:
- alias: oauth
  pack_id: io.greentic.capabilities.oauth
  version_req: ^1.0.0
  required_capabilities:
  - greentic.cap.oauth.broker.v1
flows:
- id: adaptive_mcp_oauth_demo
  file: flows/adaptive_mcp_oauth_demo.ygtc
  tags:
  - demo
  - default
  entrypoints:
  - default
- id: cards_flow
  file: flows/cards_flow.ygtc
  tags:
  - default
  entrypoints:
  - default
assets:
- path: assets/card1.json
- path: assets/card2.json
- path: assets/card3.json
- path: assets/oauth_connect_card.json
- path: assets/mcp_result_card.json
