pack_id: greentic.sales-crm.demo
version: 0.1.0
kind: application
publisher: Greentic
description: Sales CRM Assistant Demo - Lead qualification, pipeline management, and deal tracking via Salesforce

# Components for OAuth card rendering and MCP execution
components:
  - id: ai.greentic.component-adaptive-card
    version: 0.1.18
    world: greentic:component/component@0.6.0
    supports:
      - messaging
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        random: true
        clocks: true
      host: {}
    wasm: components/component_adaptive_card.wasm

  - id: mcp.exec
    version: 0.1.0
    world: root:component/root
    supports:
      - messaging
    profiles:
      default: default
      supported:
        - default
    capabilities:
      wasi:
        random: false
        clocks: false
      host: {}
    wasm: components/mcp.exec/component.wasm

# Extensions - msg2events and events2msg components
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      refs:
        - "oci://ghcr.io/greenticai/component/component-msg2events:latest"
        - "oci://ghcr.io/greenticai/component/component-events2msg:latest"
      mode: eager
      allow_tags: true

# OAuth broker dependency for Salesforce authentication
dependencies:
  - alias: oauth
    pack_id: io.greentic.capabilities.oauth
    version_req: ^1.0.0
    required_capabilities:
      - greentic.cap.oauth.broker.v1

# Flow definitions
flows:
  - id: on_message
    file: flows/on_message.ygtc
    tags:
      - default
      - messaging
    entrypoints:
      - default

  - id: on_event
    file: flows/on_event.ygtc
    tags:
      - events
      - salesforce
      - webhook
    entrypoints:
      - webhook

  - id: salesforce_oauth_flow
    file: flows/salesforce_oauth_flow.ygtc
    tags:
      - oauth
      - salesforce
    entrypoints:
      - oauth_connect

  - id: lead_qualification_flow
    file: flows/lead_qualification_flow.ygtc
    tags:
      - salesforce
      - leads
    entrypoints:
      - qualify_lead

  - id: deal_tracker_flow
    file: flows/deal_tracker_flow.ygtc
    tags:
      - salesforce
      - deals
      - pipeline
    entrypoints:
      - view_pipeline

# Asset files
assets:
  - path: assets/cards/welcome_card.json
  - path: assets/cards/salesforce_connect_card.json
  - path: assets/cards/lead_form_card.json
  - path: assets/cards/pipeline_card.json
  - path: assets/cards/deal_detail_card.json
  - path: assets/cards/meeting_card.json

# Secrets required for this pack
secrets:
  SALESFORCE_CLIENT_ID:
    description: "Salesforce Connected App Client ID (Consumer Key)"
    required: true
  SALESFORCE_CLIENT_SECRET:
    description: "Salesforce Connected App Client Secret (Consumer Secret)"
    required: true

# Setup parameters
parameters:
  oauth_provider: salesforce
  oauth_scopes:
    - api
    - refresh_token
  salesforce_instance_url: "https://login.salesforce.com"
