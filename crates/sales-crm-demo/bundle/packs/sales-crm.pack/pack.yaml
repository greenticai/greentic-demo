pack_id: greentic.sales-crm.demo
version: 0.1.0
kind: application
publisher: Greentic
components: []
dependencies:
- alias: oauth
  pack_id: io.greentic.capabilities.oauth
  version_req: ^1.0.0
  required_capabilities:
  - greentic.cap.oauth.broker.v1
flows:
- id: deal_tracker_flow
  file: flows/deal_tracker_flow.ygtc
  tags:
  - salesforce
  - deals
  - pipeline
  entrypoints:
  - view_pipeline
- id: lead_qualification_flow
  file: flows/lead_qualification_flow.ygtc
  tags:
  - salesforce
  - leads
  entrypoints:
  - qualify_lead
- id: on_event
  file: flows/on_event.ygtc
  tags:
  - events
  - salesforce
  - webhook
  entrypoints:
  - webhook
- id: on_message
  file: flows/on_message.ygtc
  tags:
  - default
  - messaging
  entrypoints:
  - default
- id: salesforce_oauth_flow
  file: flows/salesforce_oauth_flow.ygtc
  tags:
  - oauth
  - salesforce
  entrypoints:
  - oauth_connect
assets:
- path: assets/cards/welcome_card.json
- path: assets/cards/salesforce_connect_card.json
- path: assets/cards/lead_form_card.json
- path: assets/cards/pipeline_card.json
- path: assets/cards/deal_detail_card.json
- path: assets/cards/meeting_card.json
- path: assets/i18n/en.json
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      allow_tags: true
      mode: eager
      refs:
      - oci://ghcr.io/greenticai/components/component-adaptive-card@sha256:6b34848f801c7a70b8ce88e111ce49cce61e358404de17f65afefe77b07bf2d2
      - oci://ghcr.io/greenticai/component/component-msg2events@sha256:c799dea25af2521701b75b40d2827b65d4250e0574e2ab794b366ffedf601acc
      - oci://ghcr.io/greenticai/component/component-events2msg@sha256:aac2126add873723960343b86dc9e8bfbf892278b43302cc432f230dc9f5ee57
