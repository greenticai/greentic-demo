pack_id: greentic.supply-chain.demo
version: 0.1.0
kind: application
publisher: Greentic
components: []
dependencies: []
flows:
- id: on_message
  file: flows/on_message.ygtc
  tags:
  - default
  - messaging
  entrypoints:
  - default
- id: order_tracking_flow
  file: flows/order_tracking_flow.ygtc
  tags:
  - orders
  - tracking
  entrypoints:
  - track_order
- id: reorder_flow
  file: flows/reorder_flow.ygtc
  tags:
  - reorder
  - procurement
  entrypoints:
  - create_reorder
- id: stock_check_flow
  file: flows/stock_check_flow.ygtc
  tags:
  - inventory
  - stock
  entrypoints:
  - check_stock
assets:
- path: assets/cards/welcome_card.json
- path: assets/cards/stock_status_card.json
- path: assets/cards/order_tracking_card.json
- path: assets/cards/reorder_card.json
- path: assets/cards/supplier_card.json
- path: assets/cards/alert_card.json
- path: assets/i18n/en.json
extensions:
  greentic.components:
    kind: greentic.components
    version: v1
    inline:
      allow_tags: true
      mode: eager
      refs:
      - oci://ghcr.io/greenticai/components/component-adaptive-card:latest
