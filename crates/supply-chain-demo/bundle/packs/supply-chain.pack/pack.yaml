pack_id: greentic.supply-chain.demo
version: 0.1.0
kind: application
publisher: Greentic
description: Supply Chain & Inventory Demo - Stock monitoring, order tracking, and automated reorder management

# Components for card rendering and MCP execution
components:
  - id: ai.greentic.component-adaptive-card
    version: 0.1.18
    world: greentic:component/component@0.6.0
    supports:
      - messaging
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        random: true
        clocks: true
      host: {}
    wasm: components/component_adaptive_card.wasm

  - id: mcp.exec
    version: 0.1.0
    world: root:component/root
    supports:
      - messaging
    profiles:
      default: default
      supported:
        - default
    capabilities:
      wasi:
        random: false
        clocks: false
      host: {}
    wasm: components/mcp.exec/component.wasm

# No extensions needed - no external webhook events
# No dependencies on OAuth broker

# Flow definitions
flows:
  - id: on_message
    file: flows/on_message.ygtc
    tags:
      - default
      - messaging
    entrypoints:
      - default

  - id: stock_check_flow
    file: flows/stock_check_flow.ygtc
    tags:
      - inventory
      - stock
    entrypoints:
      - check_stock

  - id: order_tracking_flow
    file: flows/order_tracking_flow.ygtc
    tags:
      - orders
      - tracking
    entrypoints:
      - track_order

  - id: reorder_flow
    file: flows/reorder_flow.ygtc
    tags:
      - reorder
      - procurement
    entrypoints:
      - create_reorder

# Asset files
assets:
  - path: assets/cards/welcome_card.json
  - path: assets/cards/stock_status_card.json
  - path: assets/cards/order_tracking_card.json
  - path: assets/cards/reorder_card.json
  - path: assets/cards/supplier_card.json
  - path: assets/cards/alert_card.json
  - path: assets/i18n/en.json
    tags: [i18n, default]

# Secrets required for this pack
secrets:
  INVENTORY_API_KEY:
    description: "API key for inventory management system"
    required: true
  SUPPLIER_API_KEY:
    description: "API key for supplier portal"
    required: false

# Configuration parameters
parameters:
  low_stock_threshold: 10
  reorder_lead_days: 7
  currency: "USD"
  default_warehouse: "WH-001"
  items_per_page: 20
